<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Macronaut">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#211a44"/>
      <stop offset="52%" stop-color="#0e0f1c"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </radialGradient>
    <linearGradient id="helmet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="58%" stop-color="#e8e7f6"/>
      <stop offset="100%" stop-color="#b7b5d6"/>
    </linearGradient>
    <linearGradient id="visor" x1="0.18" y1="0.05" x2="0.82" y2="1">
      <stop offset="0%" stop-color="#a689ff"/>
      <stop offset="40%" stop-color="#5b3ee0"/>
      <stop offset="100%" stop-color="#170a30"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- fundo: quadrado arredondado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- anel de orbita atras do capacete -->
  <ellipse cx="256" cy="292" rx="190" ry="66" fill="none" stroke="#7c5cff" stroke-opacity="0.22" stroke-width="10" transform="rotate(-17 256 292)"/>

  <!-- colar / gola do traje -->
  <rect x="188" y="386" width="136" height="40" rx="20" fill="#d7d6ec"/>
  <rect x="188" y="386" width="136" height="40" rx="20" fill="none" stroke="#8f8cc0" stroke-opacity="0.55" stroke-width="3"/>

  <!-- casco do capacete -->
  <circle cx="256" cy="248" r="152" fill="url(#helmet)"/>
  <circle cx="256" cy="248" r="152" fill="none" stroke="#8f8cc0" stroke-opacity="0.5" stroke-width="4"/>

  <!-- viseira -->
  <rect x="150" y="152" width="212" height="176" rx="82" fill="url(#visor)"/>
  <rect x="150" y="152" width="212" height="176" rx="82" fill="none" stroke="#2a1650" stroke-width="3"/>

  <!-- reflexo curvo na viseira -->
  <ellipse cx="214" cy="206" rx="58" ry="26" fill="url(#shine)" opacity="0.85" transform="rotate(-26 214 206)"/>
  <!-- estrelinhas refletidas -->
  <circle cx="308" cy="242" r="7" fill="#ffffff" opacity="0.9"/>
  <circle cx="292" cy="274" r="4" fill="#ffffff" opacity="0.65"/>
</svg>
